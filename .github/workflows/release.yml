name: Release

# Only ever runs on an actual release tag push (git tag vX.Y.Z && git push
# --tags / git push origin vX.Y.Z) — no branch/PR triggers, so ordinary
# commits never build or publish anything here.
on:
  push:
    tags:
      - 'v*'

# Least-privilege default; only the publish job (which needs to attach
# assets to the Release) escalates to write.
permissions:
  contents: read

jobs:
  deb-ubuntu:
    name: .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full tag history — build.rs/Makefile both `git describe`
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libssl-dev libglib2.0-dev-bin build-essential
      - uses: dtolnay/rust-toolchain@stable
      - run: make deb
      - name: Tag filename with the distro (avoids clashing with the Debian job's output)
        run: |
          cd target/debian
          for f in *.deb; do mv "$f" "ubuntu24.04-$f"; done
      - uses: actions/upload-artifact@v6
        with:
          name: deb-ubuntu-24.04
          path: target/debian/*.deb

  deb-debian:
    name: .deb (Debian 13 / trixie, ${{ matrix.arch }})
    strategy:
      matrix:
        include:
          # arm64 covers Raspberry Pi OS too — it rebased onto Debian 13
          # (trixie) in 2026, so its GTK4/libadwaita now clear this app's
          # v4_12/v1_5 floor (unlike the older Bookworm-based Pi OS).
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    container: debian:trixie
    steps:
      # debian:trixie has no git preinstalled, and actions/checkout silently
      # falls back to a tag-less GitHub REST API tarball download (no .git
      # dir at all) when it can't find git on PATH — which starves
      # build.rs's `git describe` and makes it fall through to its
      # no-tags-found case, tacking a spurious '+' onto the version even on
      # an exact release tag. Install git before checkout so it does a real
      # fetch with full tag history instead.
      - name: Install git (needed before checkout)
        run: |
          apt-get update
          apt-get install -y git ca-certificates
      # Running inside `container:` means the checkout (owned by the host
      # runner's UID) and git (running as this container's own default
      # user, root) don't match — git 2.35.2+'s "detected dubious
      # ownership in repository" safety check (CVE-2022-24765) then
      # refuses to run *any* command against it, including build.rs's own
      # `git describe`/`rev-parse`. That failure is silently
      # indistinguishable, from build.rs's own perspective, from "no tag
      # found at all" — same spurious '+' this job's git-install fix above
      # was already once written to solve, just from a different cause
      # (confirmed live: `deb-ubuntu`, the one job here *without* a
      # `container:`, never showed it). `'*'` rather than the exact
      # checkout path — this container is thrown away at the end of the
      # job, so there's nothing a wildcard trust actually risks here.
      - name: Mark the workspace as a safe git directory
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y libgtk-4-dev libadwaita-1-dev libssl-dev libglib2.0-dev-bin build-essential curl make
      - uses: dtolnay/rust-toolchain@stable
      - run: make deb
      - name: Tag filename with the distro/arch
        run: |
          cd target/debian
          for f in *.deb; do mv "$f" "debian-trixie-${{ matrix.arch }}-$f"; done
      - uses: actions/upload-artifact@v6
        with:
          name: deb-debian-trixie-${{ matrix.arch }}
          path: target/debian/*.deb

  rpm-fedora:
    # Built against Fedora 43 - still works with 44
    name: .rpm (Fedora 43)
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      # fedora:43 has no git preinstalled, and actions/checkout silently
      # falls back to a tag-less GitHub REST API tarball download (no .git
      # dir at all) when it can't find git on PATH — which starves
      # build.rs's `git describe` and makes it fall through to its
      # no-tags-found case, tacking a spurious '+' onto the version even on
      # an exact release tag. Install git before checkout so it does a real
      # fetch with full tag history instead.
      - name: Install git (needed before checkout)
        run: dnf install -y git
      # See the identical step/comment in the deb-debian job above — same
      # "dubious ownership" issue (git 2.35.2+, CVE-2022-24765), same fix.
      - name: Mark the workspace as a safe git directory
        run: git config --global --add safe.directory '*'
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: dnf install -y cargo rust gtk4-devel libadwaita-devel openssl-devel glib2-devel gcc make
      - run: make rpm
      - uses: actions/upload-artifact@v6
        with:
          name: rpm-fedora-43
          path: target/generate-rpm/*.rpm

  source-tarball:
    name: Source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Archive the tagged commit
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --prefix="rustywiim-${version}/" -o "rustywiim-${version}.tar.gz" "$GITHUB_REF_NAME"
      - uses: actions/upload-artifact@v6
        with:
          name: source-tarball
          path: rustywiim-*.tar.gz

  publish:
    name: Attach everything to the GitHub Release
    needs: [deb-ubuntu, deb-debian, rpm-fedora, source-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Attach packages + source tarball to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            deb-ubuntu-24.04/*.deb
            deb-debian-trixie-amd64/*.deb
            deb-debian-trixie-arm64/*.deb
            rpm-fedora-43/*.rpm
            source-tarball/*.tar.gz
