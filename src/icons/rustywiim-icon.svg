  <title
     id="title287">RustyWiim app icon</title>
  <desc
     id="desc289">A rounded square icon with a dark charcoal background. Concentric circles in amber tones form a dial, darkest on the outside to lightest in the center. Five bright teal equalizer bars of varying height sit across the middle. To the upper right of the dial, a teal dot anchors the bottom of a signal mark, with three curved bands fanning upward above it, the dot lightly overlapping the top rim of the dial.</desc>
