# ── EQ / Room Correction / Channel ────────────────────────────────────────
- command: EQGetList
  summary: "Get theGEQ preset list"

- command: EQGetBand
  summary: "Read the current EQ values for 10 bands GEQ (old API, no source specified, current source)"

- command: EQGetStat
  summary: "Check if the EQ is ON or OFF (often doesn't work, probably deprecated)"

- command: EQLoad:Flat
  method: set
  summary: "Apply and return the EQ values for 10 bands GEQ for a preset (old API, no source specified)"  

- command: RoomCorrGet
  summary: "Get the current room correction settings"

- command: EQv2GetList:http://moddevices.com/plugins/caps/Eq10HP
  summary: "Get the preset list for new-style plugin based EQ, using GEQ (old non-encoded API)"

- command: EQv2GetList:http://moddevices.com/plugins/caps/EqNp
  summary: "Get the preset list for new-style plugin based EQ, using PEQ (old non-encoded API)"

- command: EQv2GetNewList:{"pluginURI":"http://moddevices.com/plugins/caps/Eq10HP"}
  urlencode: true
  summary: "Get the preset list for new-style plugin based EQ, using GEQ"

- command: EQv2GetNewList:{"pluginURI":"http://moddevices.com/plugins/caps/EqNp"}
  urlencode: true
  summary: "Get the presets for new-style plugin based EQ, using PEQ"

- command: EQv2Load:{"pluginURI":"http://moddevices.com/plugins/caps/Eq10HP","Name":"Flat"}
  method: set
  urlencode: true
  summary: "Apply and get the presets for new-style plugin based EQ, using GEQ (current source)"

- command: EQv2Load:{"pluginURI":"http://moddevices.com/plugins/caps/EqNp","Name":"Flat"}
  method: set
  urlencode: true
  summary: "Apply and get the presets for new-style plugin based EQ, using PEQ (current source)"

- command: EQv2SourceLoad:{"pluginURI":"http://moddevices.com/plugins/caps/Eq10HP","source_name":"wifi","Name":"Flat"}
  method: set
  urlencode: true
  summary: "Apply and get the presets for new-style plugin based EQ, using GEQ to specified source"

- command: EQv2SourceLoad:{"pluginURI":"http://moddevices.com/plugins/caps/EqNp","source_name":"wifi","Name":"Flat"}
  method: set
  urlencode: true
  summary: "Apply and get the presets for new-style plugin based EQ, using PEQ to specified source"

- command: EQGetLV2BandEx:{"pluginURI":"http://moddevices.com/plugins/caps/Eq10HP"}
  urlencode: true
  summary: "Read the new style current source EQ bands for a source (GEQ)"

- command: EQGetLV2BandEx:{"pluginURI":"http://moddevices.com/plugins/caps/EqNp"}
  urlencode: true
  summary: "Read the new style current source EQ bands for a source (PEQ)"

- command: EQGetLV2SourceBandEx:{"pluginURI":"http://moddevices.com/plugins/caps/Eq10HP","source_name":"wifi"}
  urlencode: true
  summary: "Read the new style per-source EQ bands for a source (GEQ)"

- command: EQGetLV2SourceBandEx:{"pluginURI":"http://moddevices.com/plugins/caps/EqNp","source_name":"wifi"}
  urlencode: true
  summary: "Read the new style per-source EQ bands for a source (PEQ)"

- command: EQGetSourceModes
  summary: "Get the EQ source modes"

- command: EQGetLV2Band:http://moddevices.com/plugins/caps/Eq10HP
  summary: "Read the old-style LV2 band for a plugin, no source specified (GEQ)"

- command: EQGetLV2Band:http://moddevices.com/plugins/caps/EqNp
  summary: "Read the old-style LV2 band for a plugin, no source specified (PEQ)"

# EQGetLV2SourceBand (non-Ex) isn't confirmed against a real device — the catalog
# gives it a single opaque `str` param, unlike EQGetLV2SourceBandEx's JSON
# {pluginURI, source_name} object above. Guessing the old-style plain-colon form
# by analogy with EQv2GetList's "old non-encoded API" pattern; verify and correct
# if a real device disagrees.
- command: "EQGetLV2SourceBand:http://moddevices.com/plugins/caps/Eq10HP:wifi"
  summary: "Read the old-style per-source EQ bands for a source (GEQ) — unconfirmed param format"

- command: "EQGetLV2SourceBand:http://moddevices.com/plugins/caps/EqNp:wifi"
  summary: "Read the old-style per-source EQ bands for a source (PEQ) — unconfirmed param format"

