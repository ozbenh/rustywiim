# Commands wiim-capture sends to a target device, beyond the always-run
# getStatusEx/getStatus model-detection pass.
#
# Schema per entry:
#   command:      the LinkPlay command, literal or a "{name}" template
#   method:       get (default) | set | getsyslog
#   safe:         only checked for method: set — defaults to false, and a
#                 Set entry is NEVER sent unless this is explicitly true.
#                 Even when true, it's still only sent if wiim-capture was
#                 invoked with --destructive — safe: true alone is no longer
#                 enough to mutate device state (added after a real run left
#                 a device's touch controls disabled, LED off, volume
#                 changed, and EQ preset overwritten).
#   params:       list of {name, values} — one command sent per value,
#                 independent parameters are crossed (cartesian product)
#   value_sets:   list of {name: value, ...} maps — for commands whose
#                 multiple placeholders must vary together, not be crossed
#   urlencode:    bool, default false — percent-encodes everything after the
#                 command name's first ":" (the substituted argument
#                 portion) before it's sent, for arguments that can contain
#                 spaces/colons/slashes/etc. unsafe to embed literally in a
#                 query string (e.g. EQv2GetNewList:{str}'s JSON argument).
#   summary/tag/operation_id: optional, purely descriptive, echoed into output
#
# method: getsyslog is reserved for exactly one entry (getsyslog itself) —
# wiim-capture special-cases it entirely (its own two-step fetch, with a
# longer timeout) rather than sending it through the normal single-GET path.
# Never gated by safe/--destructive; it's still read-only.
#
# NEVER mark a `set` command `safe: true` if it's destructive, touches
# network/WiFi credentials, reboots/resets/updates firmware, triggers an
# audible alarm, or needs real other hardware (Bluetooth, multiroom peers).
#
# Generated + hand-curated against docs/wiim-httpapi-catalog.md (2026-07-04).
# The Get-method block below is close to exhaustive for the categories judged
# relevant to a WiiM/LinkPlay audio device (playback, presets, EQ, audio
# hardware, multiroom, Bluetooth status, device diagnostics) — Alexa/TVS/
# Chromecast/streaming-account/network-config/firmware-update categories were
# deliberately left out entirely (irrelevant noise or actively risky; see the
# catalog doc). The Set-method section is intentionally sparse: only a
# handful of illustrative, clearly-reversible examples are marked
# `safe: true`; everything else mutating is either omitted or listed
# explicitly with `safe: false` as a documented "never" — review and expand
# by hand from the catalog doc as needed, this is a starting point.

# ── Confirmed-working commands missing from the OpenAPI spec ─────────────────
# (src/device/api.rs / pywiim — see docs/wiim-httpapi-catalog.md)
